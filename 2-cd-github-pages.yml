# ════════════════════════════════════════════════════════════════════════
# 2. FLUJO DE DESPLIEGUE CONTINUO (CD) A GITHUB PAGES
# ════════════════════════════════════════════════════════════════════════
# OBJETIVO:
# Despliega automáticamente el proyecto a una URL pública de GitHub Pages
# cada vez que se actualiza la rama 'main'.
# ════════════════════════════════════════════════════════════════════════

name: '2 - Deploy to GitHub Pages (CD)'

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4