# ════════════════════════════════════════════════════════════════════════
# 1. FLUJO DE INTEGRACIÓN CONTINUA (CI)
# ════════════════════════════════════════════════════════════════════════
# OBJETIVO:
# Se ejecuta en cada cambio (push) o propuesta de cambio (pull request).
# Verifica que el código se integre correctamente sin romper nada.
# ════════════════════════════════════════════════════════════════════════

name: '1 - Continuous Integration (CI)'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Log success
        run: echo "✅ CI check passed. Code is checked out successfully."