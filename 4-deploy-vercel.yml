# ════════════════════════════════════════════════════════════════════════
# 4. FLUJO DE DESPLIEGUE A VERCEL
# ════════════════════════════════════════════════════════════════════════
# OBJETIVO:
# Despliega el proyecto a producción en Vercel.
# NOTA: Vercel normalmente hace esto automáticamente, pero este flujo
# te da control manual y visibilidad en GitHub Actions.
# ════════════════════════════════════════════════════════════════════════

name: '4 - Deploy to Vercel'

on:
  push:
    branches:
      - main

jobs:
  deploy_vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Project to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod' # Despliega a producción